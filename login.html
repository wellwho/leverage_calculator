<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign in — Leveraged DCA Ladder Calculator</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: #131922;
    --panel2: #1a2230;
    --border: #243044;
    --text: #e6edf3;
    --muted: #8b98a9;
    --accent: #4fd1c5;
    --red: #f56565;
    --mono: 'SF Mono', 'Consolas', 'Menlo', monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px;
    width: 100%;
    max-width: 340px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 22px; }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%;
    background: var(--panel2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 12px;
    border-radius: 6px;
    font-size: 16px;
    font-family: var(--mono);
    margin-bottom: 14px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%;
    background: var(--accent);
    color: #0b0f14;
    border: none;
    padding: 11px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { opacity: 0.88; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .error-box {
    background: rgba(245,101,101,0.1);
    border: 1px solid var(--red);
    color: var(--red);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 14px;
    display: none;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <div class="subtitle">Leveraged DCA Ladder Calculator</div>
    <div id="errorBox" class="error-box"></div>
    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" type="text" autocomplete="username" autofocus />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" />
      <button id="loginBtn" type="submit">Sign in</button>
    </form>
  </div>

<script>
const el = (id) => document.getElementById(id);

el('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = el('errorBox');
  errorBox.style.display = 'none';

  const username = el('username').value.trim();
  const password = el('password').value;
  if (!username || !password) return;

  const btn = el('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Sign in failed.');
    window.location.href = '/';
  } catch (err) {
    errorBox.textContent = err.message || 'Sign in failed.';
    errorBox.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
});
</script>
</body>
</html>
